apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image: bandarurishitha/flask-ims:latest
        ports:
        - containerPort: 5000
        env:
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: flask-env-secret
                key: DB_USER
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: flask-env-secret
                key: DB_PASSWORD
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: flask-env-secret
                key: DB_NAME
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: flask-env-secret
                key: DB_HOST
          - name: GEMINI_API_KEY
            valueFrom:
              secretKeyRef:
                name: flask-env-secret
                key: GEMINI_API_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        command: ["gunicorn"]
        args: ["--bind", "0.0.0.0:5000", "app:app", "--workers", "2", "--timeout", "120"]
---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
spec:
  type: ClusterIP
  selector:
    app: flask-app
  ports:
  - port: 5000
    targetPort: 5000